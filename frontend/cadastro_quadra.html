<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Cadastrar Quadra</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-dark">

<div class="container mt-5">

<div class="card p-4">

<h2 class="mb-4">

🏟️ Cadastrar Quadra

</h2>

<form id="quadraForm">

<div class="mb-3">

<label>Nome da Quadra</label>

<input

type="text"

id="nome"

class="form-control"

required>

</div>

<div class="mb-3">

<label>Tipo</label>

<input

type="text"

id="tipo"

class="form-control"

placeholder="Society, Futsal..."

required>

</div>

<div class="mb-3">

<label>Preço por hora</label>

<input

type="number"

step="0.01"

id="preco"

class="form-control"

required>

</div>

<button

type="submit"

class="btn btn-success">

Cadastrar

</button>

</form>

<div

id="mensagem"

class="mt-3">

</div>

</div>

</div>

<script src="../assets/js/cadastro_quadra.js"></script>
<script src="../assets/js/proteger_proprietario.js"></script>
</body>

</html>
