<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card bg-secondary text-light p-4"
     style="width: 450px;">

    <h1 class="text-center mb-4">
        ⚽ Arena Fácil
    </h1>

    <form id="cadastroForm">

        <div class="mb-3">

            <label>Nome</label>

            <input type="text"
                   id="nome"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input type="email"
                   id="email"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Senha</label>

            <input type="password"
                   id="senha"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Tipo de conta</label>

            <select id="tipo"
                    class="form-select"
                    required>

                <option value="cliente">
                    Cliente
                </option>

                <option value="proprietario">
                    Proprietário
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-success w-100">

            Criar Conta

        </button>

    </form>

    <div id="mensagem"
         class="mt-3">

    </div>

    <hr>

    <a href="login.html"
       class="btn btn-outline-light w-100">

        Já tenho conta

    </a>

</div>

<script src="../assets/js/cadastro.js"></script>

</body>
</html>
