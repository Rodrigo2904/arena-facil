<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Cadastro de Quadras</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card bg-secondary p-4 shadow">

                <h1 class="text-center mb-4">
                    🏟 Cadastro de Quadras
                </h1>

                <form id="quadraForm">

                    <div class="mb-3">

                        <label>
                            Nome da Quadra
                        </label>

                        <input type="text"
                               id="nome"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>
                            Tipo
                        </label>

                        <select id="tipo"
                                class="form-select"
                                required>

                            <option value="society">
                                Society
                            </option>

                            <option value="futsal">
                                Futsal
                            </option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label>
                            Preço/Hora
                        </label>

                        <input type="number"
                               id="preco_hora"
                               class="form-control"
                               required>

                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">

                        Cadastrar Quadra

                    </button>

                </form>

                <div id="mensagem"
                     class="mt-3">

                </div>

                <hr>

                <a href="dashboard_proprietario.html"
                   class="btn btn-outline-light w-100">

                    Voltar

                </a>

            </div>

        </div>

    </div>

</div>

<script src="../assets/js/quadras.js"></script>
<script src="../assets/js/proteger_proprietario.js"></script>

</body>
</html>
