<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Reservar Quadra</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card bg-secondary shadow p-4">

                <h1 class="text-center mb-4">
                    📅 Reservar Quadra
                </h1>

                <form id="reservaForm">

                <select id="quadra_id"
                        class="form-select"
                        required>

                     <option value="">
                          Selecione a Quadra
                     </option>

                </select>

                    <div class="mb-3">

                        <label>
                            Data da Reserva
                        </label>

                        <input type="date"
                               id="data_reserva"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-4">

                        <label>
                            Horário
                        </label>

                        <select id="horario"
                                class="form-select"
                                required>

                            <option value="">
                                Selecione
                            </option>

                            <option>08:00</option>
                            <option>09:00</option>
                            <option>10:00</option>
                            <option>11:00</option>
                            <option>12:00</option>
                            <option>13:00</option>
                            <option>14:00</option>
                            <option>15:00</option>
                            <option>16:00</option>
                            <option>17:00</option>
                            <option>18:00</option>
                            <option>19:00</option>
                            <option>20:00</option>
                            <option>21:00</option>
                            <option>22:00</option>

                        </select>

                    </div>

                    <button type="submit"
                            class="btn btn-success w-100">

                        Reservar

                    </button>

                </form>

                <div id="mensagem"
                     class="mt-3">

                </div>

                <hr>

                <a href="dashboard_cliente.html"
                   class="btn btn-outline-light w-100">

                    Voltar

                </a>

            </div>

        </div>

    </div>

</div>

<script src="../assets/js/reservas.js"></script>
<script src="../assets/js/proteger_cliente.js"></script>

</body>
</html>
