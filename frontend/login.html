<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>LOGIN TESTE RODRIGO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card bg-secondary text-light p-4"
     style="width: 400px;">

    <h1 class="text-center mb-4">
        ⚽ Arena Fácil
    </h1>

    <form id="loginForm">

        <div class="mb-3">

            <label>Email</label>

            <input type="email"
                   id="email"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Senha</label>

            <input type="password"
                   id="senha"
                   class="form-control"
                   required>

        </div>

        <button type="submit"
                class="btn btn-primary w-100">

            Entrar

        </button>

    </form>

    <div id="mensagem"
         class="mt-3">

    </div>

</div>

<script src="../assets/js/login.js"></script>

</body>
</html>
